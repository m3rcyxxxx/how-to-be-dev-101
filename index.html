<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ai Chonky</title>

   <!-- 🔥 Dark mode โหลดก่อน -->
  
  <script>
    if (localStorage.getItem("mode") === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>
 <br>
  <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
  <br>

  <style>
   
body {
  background: linear-gradient(135deg, #ffd68a, #ff9a9e);
  font-family: 'Kanit', sans-serif;
  text-align: center;
  margin: 0;
  padding: 20px;
  padding-bottom: 300px;
}

/* กล่องหลัก */
.card {
  background: #ff6b6b;
  width: 100%;
  max-width: 500px;
  margin: auto;
  padding: 25px;
  border-radius: 25px 25px 0 0;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);

 
 
}



li {
  transition: 0.2s;
}

li:active {
  transform: scale(0.97);
}


/* input */
input {
  width: 100%;
  padding: 12px;
  border-radius: 15px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
}

/* ปุ่มเพิ่ม */
button {
  width: 100%;
  padding: 12px;
  border-radius: 15px;
  border: none;
  background: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #6fff8f;
  transform: scale(1.03);
}

/* list */
ul {
  list-style: none;
  padding: 0;
  padding-bottom: 150px;
  margin-top: 15px;
}

/* กล่องโน๊ต */
li {
  background: white;
  color: black;
  padding: 12px;
  margin: 10px 0;
  border-radius: 15px;

  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ข้อความ */
li span {
  flex: 1;
  text-align: left;
}

/* ปุ่มลบ (เล็กลง + ดูดีขึ้น) */
li button {
  width: auto;
  padding: 6px 12px;
  background: #ff4d4d;
  color: white;
  border-radius: 10px;
  margin-left: 10px;
}

li button:hover {
  background: #cc0000;
}



/* รูป */
img {
  width: 150px;
  border-radius: 40%;
  margin-bottom: 15px;
}


html.dark body {
  background: #121212;
  color: white;
}

html.dark .card {
  background: #1e1e1e;
}

html.dark li {
  background: #2a2a2a;
  color: white;
}

html.dark input {
  background: #333;
  color: white;
}

html.dark button {
  background: #444;
  color: white;
}




  </style>
</head> 




<br><br>

<body>

  <img src="im hurt.jpeg" width="200">
  <br><br>

  <div class="card">
    <input id="noteInput" placeholder="Type message here">
    <button onclick="addNote()">Add note</button>
    <ul id="noteList"></ul>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    
    const firebaseConfig = {
      apiKey: "AIzaSyCBQx-uKobBB3Dla2Un4q_u9hXOoChNpnk",
      authDomain: "m3rcyxxxx.firebaseapp.com",
      databaseURL: "https://m3rcyxxxx-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "m3rcyxxxx",
    };

     firebase.initializeApp(firebaseConfig);
    var db = firebase.database();
    

  
  // function MAIN
 
  // function เพิ่มโน๊ต
function addNote() {
  let input = document.getElementById("noteInput");
  let text = input.value.trim();

  if (text === "") return;

  db.ref("notes").push({
    text: text
  });

  input.value = "";
}
    
// function DarkMode
function toggleDarkMode() {
  document.documentElement.classList.toggle("dark");

  if (document.documentElement.classList.contains("dark")) {
    localStorage.setItem("mode", "dark");
  } else {
    localStorage.setItem("mode", "light");
  }
}

   

   



// realtime🔥 
// ✅ โหลด (ตอนเพิ่ม)
db.ref("notes").on("child_added", function(snapshot) {
  let data = snapshot.val();
  let key = snapshot.key;

  let li = document.createElement("li");
  li.setAttribute("data-key", key);

  let span = document.createElement("span");
  span.innerText = data.text;

  // ✅ ปุ่มแก้ไข
  let editBtn = document.createElement("button");
  editBtn.innerText = "Edit";

  // ✅ ปุ่มลบ
  let delBtn = document.createElement("button");
  delBtn.innerText = "Delete";

  delBtn.onclick = function() {
    if (confirm("Confirm ?")) {
    db.ref("notes/" + key).remove();
 } 
};


  // 🔥 ตอนกด "แก้ไข"
  editBtn.onclick = function() {

  let input = document.createElement("input");
  input.value = span.innerText;

  let saveBtn = document.createElement("button");
  saveBtn.innerText = "บันทึก";

  // เปลี่ยน UI
  li.replaceChild(input, span);
  li.replaceChild(saveBtn, editBtn);

  // โฟกัส
  input.focus();

  // 🔥 เลื่อนให้ไม่โดนคีย์บอร์ด
  setTimeout(() => {
    input.scrollIntoView({
      behavior: "smooth",
      block: "center"
    });
  }, 300);

  // กดบันทึก
  saveBtn.onclick = function() {
    let newText = input.value.trim();

    if (newText !== "") {
      db.ref("notes/" + key).update({
        text: newText
      });
    }

    span.innerText = newText;
    li.replaceChild(span, input);
    li.replaceChild(editBtn, saveBtn);
  };

  // Enter = บันทึก
  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      saveBtn.click();
    }
  });
};

  li.appendChild(span);
  li.appendChild(editBtn);
  li.appendChild(delBtn);

  document.getElementById("noteList").appendChild(li);
});


// ✅ realtime ลบ
db.ref("notes").on("child_removed", function(snapshot) {
  let key = snapshot.key;

  let items = document.querySelectorAll("li");

  items.forEach(function(li) {
    if (li.getAttribute("data-key") === key) {
      li.remove();
    }
  });
});

// ✅ realtime แก้ไข
db.ref("notes").on("child_changed", function(snapshot) {
  let key = snapshot.key;
  let data = snapshot.val();

  let items = document.querySelectorAll("li");

  items.forEach(function(li) {
    if (li.getAttribute("data-key") === key) {
      li.querySelector("span").innerText = data.text;
    }
  });
});

// ✅ Enter
document.getElementById("noteInput").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();

    let input = this;
    let text = input.value.trim();

    if (text !== "") {
      addNote();
      input.blur();
    }
  }
});






input.focus();



</script> 


</body>
</html>
