<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ai Chonky</title>

  <style>
   
body {
  background: linear-gradient(135deg, #ffd68a, #ff9a9e);
  font-family: 'Kanit', sans-serif;
  text-align: center;
  margin: 0;
  padding: 20px;
}

/* กล่องหลัก */
.card {
  background: #ff6b6b;
  width: 90%;
  max-width: 400px;
  margin: auto;
  padding: 25px;
  border-radius: 25px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

/* input */
input {
  width: 100%;
  padding: 12px;
  border-radius: 15px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
}

/* ปุ่มเพิ่ม */
button {
  width: 100%;
  padding: 12px;
  border-radius: 15px;
  border: none;
  background: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #6fff8f;
  transform: scale(1.03);
}

/* list */
ul {
  list-style: none;
  padding: 0;
  margin-top: 15px;
}

/* กล่องโน๊ต */
li {
  background: white;
  color: black;
  padding: 12px;
  margin: 10px 0;
  border-radius: 15px;

  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ข้อความ */
li span {
  flex: 1;
  text-align: left;
}

/* ปุ่มลบ (เล็กลง + ดูดีขึ้น) */
li button {
  width: auto;
  padding: 6px 12px;
  background: #ff4d4d;
  color: white;
  border-radius: 10px;
  margin-left: 10px;
}

li button:hover {
  background: #cc0000;
}

/* รูป */
img {
  width: 150px;
  border-radius: 40%;
  margin-bottom: 15px;
}

  </style>
</head>

<body>

  <img src="im hurt.jpeg" width="200">
  <br><br>

  <div class="card">
    <input id="noteInput" placeholder="พิมพ์โน๊ต">
    <button onclick="addNote()">เพิ่มโน๊ต</button>
    <ul id="noteList"></ul>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCBQx-uKobBB3Dla2Un4q_u9hXOoChNpnk",
      authDomain: "m3rcyxxxx.firebaseapp.com",
      databaseURL: "https://m3rcyxxxx-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "m3rcyxxxx",
    };

    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    // ✅ ฟังก์ชันเดียวพอ (ไม่ซ้ำ)
    function addNote() {
      let input = document.getElementById("noteInput");
      let text = input.value.trim();

      if (text === "") return;

      db.ref("notes").push({
        text: text
      });

      input.value = "";
    }

    // ✅ โหลดข้อมูล
    db.ref("notes").on("child_added", function(snapshot) {
      let data = snapshot.val();
      let key = snapshot.key;

      
        let li = document.createElement("li");

        let span = document.createElement("span");
        span.innerText = data.text;

      let delBtn = document.createElement("button");
      delBtn.innerText = "ลบ";

      delBtn.onclick = function() {
        db.ref("notes/" + key).remove();
        li.remove();
      };
      li.appendChild(span);
      li.appendChild(delBtn);
      document.getElementById("noteList").appendChild(li);
    });

    // ✅ Enter กดได้แน่นอน
    document.getElementById("noteInput").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    event.preventDefault(); // กันขึ้นบรรทัดใหม่

    let input = this;
    let text = input.value.trim();

    if (text !== "") {
      addNote();
      input.blur(); // 🔥 ทำให้คีย์บอร์ดมือถือหาย
    }
  }
});
  </script>

</body>
</html>
