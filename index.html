<!DOCTYPE html>
<html>
    <head>
        <title> Ai Chonky </title>
        <style>
            .card {
                background-color: #e95757;
                width: 400px;
                margin: 40px auto;
                padding: 50px;
                border-radius: 50px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
                
                display: flex;
                flex-direction: column;
                align-items: center;

                



             
             }
            body {
                background-color: #ffd68a;
                font-family: Arial;
                font-size: xx-large;
                font-style: italic;
                text-align: center;
            }
            h1 {
                color: rgb(153, 0, 39);
            }

            p {
                color: #ffffff;
            }

            img {
                border-radius: 10px;
            }
            
            .btn {
                display: inline-block;
                background: rgb(255, 255, 255);
                color: rgb(226, 88, 253);
                padding: 10px 20px;
                border-radius: 220px;
                margin-top: 15px;
                text-decoration: none;
            }

            .btn:hover {
                background: rgb(116, 255, 116);
                padding: 20px 20px;
            }

        </style>
    </head>




    <body>
        <div class="card"> 
        <h1>Marisa</h1>
        <p>ฉันกำลังเริ่มต้นเส้นทาง Full Stack Developer</p>
        
        <h4>เกี่ยวกับฉัน</h4>
        <p>ตอนนี้กำลังฝึกเขียน HTML วันแรก</p>
        </div>
        

        
        <br>
        <br>
        
        <p><img src="https://picsum.photos/200" alt="my image"></p>
        
        
        <img src="im hurt.jpeg" alt="my photo" width="200">
        <br><br><br>
         
        <div class="card"> 

            <button id="myBtn">กดฉัน</button>
            <p id="demo">สวัสดี</p>
           
            <a href="https://google.com" class="btn">ไปที่ Google</a> 
        
        
           
           
           
           
           
           
           <script>
                let isChanged = false;

            document.getElementById("myBtn").addEventListener("click", function() 
            {
            
                let text = document.getElementById("demo");
                
                if (isChanged) 
            {
                text.innerText = "สวัสดี";
            }

                else
            {
                text.innerText = "ฉันเริ่มเขียน JavaScript แล้ว";
            }
            
                isChanged = !isChanged; 
            });
            
            
            
function addNote() {

  let input = document.getElementById("noteInput");
  let text = input.value;

  let li = document.createElement("li");
  li.innerText = text;

  let delBtn = document.createElement("button");
  delBtn.innerText = "ลบ";
  
  delBtn.onclick = function() {
    li.remove();
  };

  li.appendChild(delBtn);

  document.getElementById("noteList").appendChild(li);

  input.value = "";
}
            
            
            
            
            
            
            
            
            
            </script>

            
            <br> <br> 

            <input id ="noteInput" placeholder="พิมพ์โน๊ต">
            <br>
            <button onclick="addNote()"> เพิ่มโน๊ต </button>
            
            <ul id="noteList"></ul>




        </div>
        



            
    </body>
</html>
