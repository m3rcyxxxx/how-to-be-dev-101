<script>

};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

function addNote() {
  let text = document.getElementById("noteInput").value;

  db.ref("notes").push({
    text: text
  });

  document.getElementById("noteInput").value = "";
}

db.ref("notes").on("child_added", function(snapshot) {
  let data = snapshot.val();
  let key = snapshot.key;

  let li = document.createElement("li");
  li.innerText = data.text;

  let delBtn = document.createElement("button");
  delBtn.innerText = "ลบ";

  delBtn.onclick = function() {
    db.ref("notes/" + key).remove();
    li.remove();
  };

  li.appendChild(delBtn);
  document.getElementById("noteList").appendChild(li);
});
</script>

            
            <br> <br> 

            <input id ="noteInput" placeholder="พิมพ์โน๊ต">
            <br>
            <button onclick="addNote()"> เพิ่มโน๊ต </button>
            
            <ul id="noteList"></ul>
